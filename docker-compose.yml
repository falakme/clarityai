# ClarityAI — Coolify-compatible stack
# Runs the Next.js frontend and the FastAPI backend. ClarityAI is stateless:
# there is no database. Documents are processed in memory and never persisted.
#
# On Coolify: point the app at this compose file. Coolify injects the
# environment variables defined in its UI; the defaults below are for local
# development via `docker compose up --build`.
#
# NETWORK TOPOLOGY:
#   coolify (external) — Coolify's Traefik proxy network. The frontend joins
#                        this so the proxy can route clarityai.falak.me → :3000.
#   internal           — Private bridge between frontend and backend only.
#                        The backend is never reachable from the proxy.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - backend
    networks:
      - coolify   # lets Traefik reach the frontend
      - internal  # lets the frontend reach the backend

networks:
  coolify:
    external: true   # Coolify's pre-existing proxy network
  internal:
    driver: bridge   # private backend↔frontend link, invisible to the proxy
